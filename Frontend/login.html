<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — UserBase</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Login-specific layout ── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: fadeSlideUp 0.45s ease both;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .login-logo .logo-icon { font-size: 1.5rem; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
    .login-logo .logo-text { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; letter-spacing: -0.03em; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 0.65rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all var(--transition);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>

  <!-- Toast (reused from main style) -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">UserBase</span>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Panel -->
      <div id="tab-login" class="tab-panel active">
        <div class="field-group">
          <label for="lemail">Email Address</label>
          <input type="email" id="lemail" placeholder="jane@example.com" autocomplete="email" />
          <span class="field-line"></span>
        </div>
        <div class="field-group">
          <label for="lpass">Password</label>
          <input type="password" id="lpass" placeholder="••••••••" autocomplete="current-password" />
          <span class="field-line"></span>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="login()">Login</button>
      </div>

      <!-- Signup Panel -->
      <div id="tab-signup" class="tab-panel">
        <div class="field-group">
          <label for="sname">Full Name</label>
          <input type="text" id="sname" placeholder="Jane Doe" autocomplete="name" />
          <span class="field-line"></span>
        </div>
        <div class="field-group">
          <label for="semail">Email Address</label>
          <input type="email" id="semail" placeholder="jane@example.com" autocomplete="email" />
          <span class="field-line"></span>
        </div>
        <div class="field-group">
          <label for="sage">Age</label>
          <input type="number" id="sage" placeholder="25" min="1" max="120" />
          <span class="field-line"></span>
        </div>
        <div class="field-group">
          <label for="spass">Password</label>
          <input type="password" id="spass" placeholder="••••••••" autocomplete="new-password" />
          <span class="field-line"></span>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="signup()">Create Account</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
    }

    // Enter key support
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const activeTab = document.querySelector(".tab-panel.active").id;
      if (activeTab === "tab-login")  login();
      if (activeTab === "tab-signup") signup();
    });
  </script>
</body>
</html>
